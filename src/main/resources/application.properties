server.servlet.context-path=/lms

# Datasource credentials are supplied via environment variables.
# The values after the ':' are LOCAL DEVELOPMENT defaults only.
# In any real environment, set SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME /
# SPRING_DATASOURCE_PASSWORD (e.g. via your secrets manager) and do NOT commit real secrets.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/lmsapp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
#spring.jpa.hibernate.ddl-auto=create
spring.web.error.include-filter=false

# --- Database backup endpoint (POST /lms/backup) ---
# Every folderPath in the request must resolve to a location INSIDE this directory
# (path-traversal / arbitrary-write guard). Leave blank to disable containment
# (then only null/blank paths and non-directory paths are rejected).
app.backup.root=D:/lms-backups
# Path to the dump binary. Leave as the bare name if it is on the server PATH.
app.backup.mysqldump-path=mysqldump
app.backup.pg-dump-path=pg_dump
